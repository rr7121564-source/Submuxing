name: Video Encoding Worker

on:
  workflow_dispatch:
    inputs:
      task_type:
        required: true
      video_id:
        required: true
      sub_id:
        required: true
      rename:
        required: true
      user_id:
        required: true
      origin_chat:
        required: true
      dump_id:
        required: true
      thread_id:
        required: true
      thumb_id:
        required: true
      font_id:
        required: true
      logo_id:
        required: true

concurrency:
  group: encoding-queue
  cancel-in-progress: false

jobs:
  encode:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg
          pip install pyrogram tgcrypto

      - name: Run Worker
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TASK_TYPE: ${{ github.event.inputs.task_type }}
          VIDEO_ID: ${{ github.event.inputs.video_id }}
          SUB_ID: ${{ github.event.inputs.sub_id }}
          RENAME: ${{ github.event.inputs.rename }}
          USER_ID: ${{ github.event.inputs.user_id }}
          ORIGIN_CHAT: ${{ github.event.inputs.origin_chat }}
          DUMP_ID: ${{ github.event.inputs.dump_id }}
          THREAD_ID: ${{ github.event.inputs.thread_id }}
          THUMB_ID: ${{ github.event.inputs.thumb_id }}
          FONT_ID: ${{ github.event.inputs.font_id }}
          LOGO_ID: ${{ github.event.inputs.logo_id }}
        run: python encoder.py
